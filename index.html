<div style="width:100%;height:15vh;min-height:80px;background:#e5e7eb;display:flex;align-items:center;justify-content:center;gap:15px;padding:20px;box-sizing:border-box;">

    <input
        id="search"
        placeholder="Search applications..."
        style="flex:1;max-width:700px;height:50px;padding:0 18px;border:none;border-radius:12px;font-size:16px;outline:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.08);">

    <button
        id="theme"
        style="width:50px;height:50px;border:none;border-radius:12px;background:#374151;color:#fff;font-size:22px;cursor:pointer;">
        🌙
    </button>

</div>
</header>
<section class="hero">
<h1>🚀 Professional Application Hub</h1></br>

</section>
<section class="grid" id="grid">
<div class="card" data-name="AI Assistant" onclick="openApp('apps/ai/index.html')"><h3>🤖 AI Assistant</h3><p>Automation & Chat</p></div>
<div class="card" data-name="HR System" onclick="openApp('apps/hr.html')"><h3>👨‍💼 HR</h3><p>Employees</p></div>
<div class="card" data-name="Finance" onclick="openApp('apps/finance.html')"><h3>💰 Finance</h3><p>Accounts</p></div>
