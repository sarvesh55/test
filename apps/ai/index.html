<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}
body{background:#0b1220;height:100vh}
.app{display:flex;flex-direction:column;height:100vh;max-width:1100px;margin:auto;background:#111827}
header{height:64px;background:#2563eb;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 18px}
#chat{flex:1;overflow:auto;padding:20px;background:#0f172a}
.msg{max-width:80%;padding:14px 16px;border-radius:16px;margin:10px 0;line-height:1.5;white-space:pre-wrap}
.user{margin-left:auto;background:#2563eb;color:#fff}
.ai{background:#1f2937;color:#fff}
footer{display:flex;gap:10px;padding:15px;background:#111827}
textarea{flex:1;resize:none;min-height:54px;max-height:180px;padding:14px;border-radius:14px;border:1px solid #334155;background:#1e293b;color:#fff}
button{width:70px;border:none;border-radius:14px;background:#2563eb;color:#fff;font-size:18px;cursor:pointer}
@media(max-width:768px){.msg{max-width:95%}header h2{font-size:18px}}
</style>
</head>
<body>
<div class="app">
<header>
<h2>🤖 AI Chat</h2>
<button onclick="toggleTheme()">🌙</button>
</header>

<div id="chat">
<div class="msg ai">Hello! Update the API section below and start chatting.</div>
</div>

<footer>
<textarea id="prompt" placeholder="Type a message..."></textarea>
<button onclick="send()">Send</button>
</footer>
</div>

<script>
const OPENAI_API_KEY = "YOUR_OPENAI_API_KEY";

const chat = document.getElementById("chat");
const input = document.getElementById("prompt");

input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

function add(text, type) {
    const d = document.createElement("div");
    d.className = "msg " + type;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {

    const text = input.value.trim();

    if (!text) return;

    add(text, "user");

    input.value = "";

    add("Thinking...", "ai");

    const ai = chat.lastElementChild;

    try {

        const response = await fetch("https://api.openai.com/v1/chat/completions", {

            method: "POST",

            headers: {

                "Content-Type": "application/json",

                "Authorization": `Bearer ${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}`

            },

            body: JSON.stringify({

                model: "gpt-4.1",

                messages: [

                    {
                        role: "system",
                        content: "You are a helpful AI assistant."
                    },

                    {
                        role: "user",
                        content: text
                    }

                ],

                temperature: 0.7,

                max_tokens: 1000

            })

        });

        if (!response.ok) {
            throw new Error(await response.text());
        }

        const data = await response.json();

        ai.textContent = data.choices[0].message.content;

    } catch (e) {

        ai.textContent = "Error: " + e.message;

    }

}

function toggleTheme() {

    document.body.style.filter =
        document.body.style.filter
            ? ""
            : "invert(1) hue-rotate(180deg)";

}
</script>
</body>
</html>
