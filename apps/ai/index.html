<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Chat</title>
<style>
*{box-sizing:border-box;font-family:Arial;margin:0}
body{background:#0f172a;color:#fff;height:100vh}
.app{display:flex;flex-direction:column;height:100vh;max-width:900px;margin:auto}
header{padding:15px;background:#2563eb;font-size:22px;font-weight:bold}
#chat{flex:1;overflow:auto;padding:15px}
.msg{padding:12px 15px;border-radius:14px;margin:10px 0;max-width:80%;white-space:pre-wrap}
.user{margin-left:auto;background:#2563eb}
.ai{background:#1f2937}
footer{display:flex;gap:10px;padding:12px}
textarea{flex:1;padding:12px;border-radius:10px;resize:none}
button{padding:12px 18px;border:none;background:#2563eb;color:#fff;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<div class="app">
<header>🤖 AI Chat</header>
<div id="chat"><div class="msg ai">Hello!</div></div>
<footer>
<textarea id="prompt" placeholder="Type..."></textarea>
<button onclick="send()">Send</button>
</footer>
</div>
<script>
const chat=document.getElementById("chat");
const prompt=document.getElementById("prompt");
function add(t,c){const d=document.createElement("div");d.className="msg "+c;d.textContent=t;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;}
async function send(){
 const text=prompt.value.trim();
 if(!text)return;
 add(text,"user"); prompt.value="";
 add("Thinking...","ai");
 const ai=chat.lastElementChild;
 try{
  const r=await fetch("http://localhost:3000/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });
  const data=await r.json();
  ai.textContent=data.reply||JSON.stringify(data);
 }catch(e){ai.textContent=e.message;}
}
prompt.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
</script>
</body></html>
