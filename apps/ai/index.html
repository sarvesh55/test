<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f6fb;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat{
    width:100%;
    max-width:900px;
    height:95vh;
    background:#fff;
    display:flex;
    flex-direction:column;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.header{
    background:#0f172a;
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.messages{
    flex:1;
    overflow:auto;
    padding:20px;
    background:#eef2f7;
}

.msg{
    max-width:80%;
    padding:12px 16px;
    border-radius:16px;
    margin:10px 0;
    white-space:pre-wrap;
    animation:fade .3s;
}

.user{
    background:#2563eb;
    color:#fff;
    margin-left:auto;
}

.ai{
    background:#fff;
    color:#111;
}

.bottom{
    display:flex;
    padding:15px;
    gap:10px;
    background:#fff;
}

textarea{
    flex:1;
    resize:none;
    border:1px solid #ddd;
    border-radius:12px;
    padding:12px;
    height:55px;
    outline:none;
    font-size:16px;
}

button{
    width:120px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1d4ed8;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:700px){

.chat{
height:100vh;
border-radius:0;
}

button{
width:80px;
}

}
</style>
</head>

<body>

<div class="chat">

<div class="header">
🤖 AI Assistant
</div>

<div class="messages" id="messages">
<div class="msg ai">
Hello 👋<br>
Ask me anything.
</div>
</div>

<div class="bottom">
<textarea id="input" placeholder="Type a message..."></textarea>
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const API_KEY="YOUR_OPENAI_API_KEY";

const messages=document.getElementById("messages");

const input=document.getElementById("input");

input.addEventListener("keypress",function(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault();

sendMessage();

}

});

async function sendMessage(){

const text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

const thinking=document.createElement("div");

thinking.className="msg ai";

thinking.innerHTML="Thinking...";

messages.appendChild(thinking);

messages.scrollTop=messages.scrollHeight;

try{

const response=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer =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;
},

body:JSON.stringify({

model:"gpt-4.1-mini",

messages:[
{
role:"user",
content:text
}
]

})

});

const data=await response.json();

thinking.remove();

let reply="No response.";

if(data.choices){

reply=data.choices[0].message.content;

}

addMessage(reply,"ai");

}
catch(e){

thinking.innerHTML="Error: "+e.message;

}

}

function addMessage(text,type){

const div=document.createElement("div");

div.className="msg "+type;

div.textContent=text;

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

}

</script>

</body>
</html>
